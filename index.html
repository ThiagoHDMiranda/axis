<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      content="width=device-width,initial-scale=1,viewport-fit=cover"
      name="viewport"
    />
    <title>AXIS</title>
    <meta content="#0b5fb6" name="theme-color" />
    <style>
      :root{
 --blue:#0b5fb6; --blue2:#0a4f98;
 --bg:#eef2f7; --card:#ffffff;
 --text:#0f172a; --muted:#64748b;
 --line:#d7dee9; --ok:#1f8f3a; --bad:#b42318;
 --shadow: 0 10px 24px rgba(15,23,42,.08);
 --radius:14px;
 }
      *{box-sizing:border-box}
 body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text);}
      .app{max-width:420px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative;}
      @media print{
 body{background:#fff;}
 .topbar,.nav,.btn,.btnAlt{display:none !important;}
 main{padding:0;}
 .app{max-width:none; margin:0; min-height:auto;}
 .card{box-shadow:none; border:0; margin:0;}
 .card .head{background:#fff; border-bottom:1px solid #ddd;}
 .blueHead,.secHeader{background:#0b5fb6 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; color:#fff !important;}
 .r{display:flex;justify-content:space-between;gap:10px;padding:12px 12px;border-bottom:1px solid var(--line);font-size:13px;background:#fff;align-items:flex-start;flex-wrap:wrap;}
 }
      .topbar{position:sticky; top:0; z-index:20; background:linear-gradient(180deg,var(--blue),var(--blue2)); color:#fff; padding:14px 14px 10px; box-shadow:0 6px 18px rgba(2,6,23,.18);}
 .topbar .row{display:flex; align-items:center; justify-content:center; gap:10px;}
      .topbar{padding:16px 16px 12px;}
      .row{display:flex; align-items:center; justify-content:center; gap:10px;}
      .homeTop{justify-content:center; align-items: center;}
      .brand{display:flex; align-items:center; gap:10px;}
 .brandimg{height:46px;width:auto;display:block;filter: drop-shadow(0 6px 10px rgba(15,23,42,.18));}
 @media (max-width:380px){
 .brandimg{height:40px;}
 }
 .brand{gap:12px;}
 .brandimg{height:60px;}
 @media (max-width:420px){
 .brandimg{height:52px;}
 }
 .main-content{
  position: absolute;
  width: 100%;
  min-height: 100vh;
  top: 0px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0px 40px;
 }
 .login{
  border: 1px solid gray;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  gap: 25px;
  border-radius: 15px;
  width: 100%;
 }
 .card-login{
display: flex;
flex-direction: column;
gap: 5px;

 }
 .card-login label{
  color: var(--blue);
  font-weight: bold;
  font-size: 18px;
}
.card-login input{
  --tw-outline-style: none;
  outline-style: none;
  margin-left: 10px;
  padding: 2px 5px;
  border: none;
  border-bottom: 1px solid gray;
  border-left: 1px solid gray;
  background-color: transparent;
  border-bottom-left-radius: 5px;
  font-size: 14px;
 }
 #error{
  color: red;
  font-size: 15px;
 }
 #login-button{
display: flex;
align-items: center;
justify-content: center;

 }
 #login-button #button{
  color: white;
  background-color: var(--blue);
  border: 1px solid gray;
  padding: 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 18px;
 }
    </style>
  </head>
  <body>
<div class="app">
<div class="topbar">
<div class="row homeTop">
<div class="brand" style="gap:0;">
<img alt="AXIS • Soluções em Engenharia" class="brandimg" src="./logo_axis.png"/>
</div>
</div>
</div>
<div class="main-content">
<div class="login">
  <div class="card-login">
    <label for="user">Usuário</label>
    <input type="text" id="user" placeholder="Usuário" onchange=resetError()>
  </div>
  <div class="card-login">
    <label for="pass">Senha</label>
    <input type="password" id="pass" placeholder="Senha" onchange=resetError()>
  </div>
  <div id="error"></div>
  <div id="login-button">
    <button id="button">Entrar</button>
  </div>
</div>
</div>
</div>
<script>
  const button = document.getElementById("button")
  button.addEventListener("click", login)
  
  function login(){
    const user = document.getElementById("user")
    const pass = document.getElementById("pass")
    
    const userValue = user.value
    const passValue = pass.value
    
    console.log(userValue)
    console.log(passValue)
    
    if(userValue === "salum" && passValue === "senha"){
    window.location.href = "content.html?name=true";
  }else{
    const error = document.getElementById("error")
    error.textContent = "Usuário e/ou senha incorretos"
  }}

  function resetError(){
    const error = document.getElementById("error")
    error.textContent = ""
  }
</script>
</html>
